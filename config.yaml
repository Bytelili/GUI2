project:
  name: papo
  seed: 42
paths:
  project_root: ${PAPO_PROJECT_ROOT:-/home/dumike/zyy/GUI2}
  fingertip_root: ${FINGERTIP_ROOT:-/home/dumike/zyy/GUI/data/raw/fingertip20k}
  raw_root: ${PAPO_RAW_ROOT:-/home/dumike/zyy/GUI/data/raw/fingertip20k}
  archive_root: ${FINGERTIP_ARCHIVE_ROOT:-/home/dumike/zyy/GUI/data/raw/fingertip20k}
  official_root: ${FINGERTIP_OFFICIAL_ROOT:-/home/dumike/zyy/GUI2/data/official/fingertip20k}
  protocol_dir: ${PAPO_PROTOCOL_DIR:-/home/dumike/zyy/GUI2/data/papo_protocol}
  work_dir: ${PAPO_WORK_DIR:-/home/dumike/zyy/GUI2/data/papo_config_run}
  task_dir: ${PAPO_TASK_DIR:-/home/dumike/zyy/GUI2/data/papo_tasks}
  llamafactory_dir: /home/dumike/zyy/GUI2/LLaMA-Factory
  llamafactory_data_dir: /home/dumike/zyy/GUI2/LLaMA-Factory/data/papo
  asset_prefix: RawDataset
  qwen_model_path: ${QWEN_MODEL_PATH:-/home/dumike/zyy/GUI/backbone/Qwen2.5-VL-3B-Instruct}
  checkpoint_root: ${PAPO_CHECKPOINT_ROOT:-/home/dumike/zyy/GUI2/LLaMA-Factory/saves/papo}
  logging_root: ${PAPO_LOGGING_ROOT:-/home/dumike/zyy/GUI2/runs/papo}
data:
  protocol:
    protocol_id: fingertip20k_strict_temporal_v2
    source_train_split: train_set.csv
    proactive_test_split: test_suggestion.csv
    execution_test_split: test_execution.csv
    validation_fraction: 0.05
    min_validation_per_user: 1
  require_complete: true
  suggestion_screenshot_level: 3
  suggestion_history_limit: 20
  max_episodes: 0
  max_episodes_per_user: 0
  root_only: true
  progress_every: 25
proactive_fixed:
  enabled: true
  input_wide_csv: ${PAPO_FIXED_INPUT_WIDE_CSV:-}
  output_dir: data/proactive_fixed
  clean_output_dir: data/proactive_fixed_clean
  report_dir: reports/proactive_fixed
  clean_report_dir: reports/proactive_fixed_clean
  eval_ratio: 0.05
  dpo_beta: 0.1
  min_target: 0.55
  max_target: 0.98
  make_image_relative: true
  image_root: /home/dumike/zyy/GUI
  dpo:
    max_pairs_per_row: 2
    min_reward_gap: 0.05
    min_char_similarity: 0.20
    max_char_similarity: 0.98
    same_user_min_similarity: 0.45
    same_user_max_similarity: 0.95
  rerank:
    min_candidates: 2
    shuffle_candidates: true
    seed: 42
  weighted_listwise:
    enabled: true
    temperature: 0.15
    min_context_prob: 0.02
    min_oracle_prob: 0.65
    max_oracle_prob: 0.95
papo:
  tree:
    max_depth: 3
    same_user_k: 2
    cross_user_k: 2
    max_candidates: 6
  references:
    same_user_top_k: 5
    cross_user_top_k: 5
    different_age_group_negative: true
    intent_similarity_threshold: 0.0
    exclude_same_intent: true
  reward:
    eta: 0.5
    evidence_transform: tanh_log_ratio
    fingertip_temperature: 0.2
    epsilon: 1.0e-06
    min_same_user_references: 1
    task_similarity_threshold: 0.5
    require_finish: false
  value:
    conservative_alpha: 0.1
    beta: 0.1
    base_policy_prior: support
  pairwise:
    margin: 0.05
    tau_m: 0.2
    max_weight: 5.0
  coverage:
    kappa: 3.0
training:
  model_name_or_path: ${QWEN_MODEL_PATH:-/home/dumike/zyy/GUI/backbone/Qwen2.5-VL-3B-Instruct}
  template: qwen2_vl
  cutoff_len: 4096
  image_max_pixels: 262144
  lora_rank: 16
  proactive_oracle_sft_fixed:
    output_name: proactive_oracle_sft_fixed_clean_v2
    epochs: 3
    learning_rate: 1.0e-4
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 2
    gradient_checkpointing: false
    eval_steps: 50
    logging_steps: 5
  proactive_dpo_fixed:
    output_name: proactive_dpo_fixed_clean_v2
    epochs: 2
    learning_rate: 5.0e-6
    pref_beta: 0.1
    pref_loss: papo
    adapter_name_or_path: /home/dumike/zyy/GUI2/LLaMA-Factory/saves/papo/proactive_oracle_sft_fixed_clean_v2_best
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    gradient_checkpointing: true
    eval_steps: 25
    logging_steps: 5
  proactive_rerank_fixed:
    output_name: proactive_rerank_fixed_clean_v2
    epochs: 2
    learning_rate: 5.0e-5
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 2
    gradient_checkpointing: false
    eval_steps: 50
    logging_steps: 5
  proactive_weighted_listwise_fixed:
    output_name: proactive_weighted_listwise_fixed_clean_v2
    epochs: 2
    learning_rate: 1.0e-5
    use_papo_listwise: true
    adapter_name_or_path: /home/dumike/zyy/GUI2/LLaMA-Factory/saves/papo/proactive_oracle_sft_fixed_clean_v2_best
    per_device_train_batch_size: 2
    per_device_eval_batch_size: 2
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
    eval_steps: 25
    logging_steps: 5
  proactive_sft:
    epochs: 3
    learning_rate: 0.0001
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 2
    gradient_checkpointing: false
    eval_steps: 50
  execution_sft:
    epochs: 3
    learning_rate: 0.0001
    per_device_train_batch_size: 2
    per_device_eval_batch_size: 2
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
    eval_steps: 25
  execution_listwise:
    epochs: 2
    learning_rate: 1.0e-05
    use_papo_listwise: true
    per_device_train_batch_size: 2
    per_device_eval_batch_size: 2
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
    eval_steps: 25
  execution_dpo:
    epochs: 2
    learning_rate: 5.0e-06
    pref_beta: 0.1
    pref_loss: papo
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 16
    gradient_checkpointing: true
    eval_steps: 10
