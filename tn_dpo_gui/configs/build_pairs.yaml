main_project:
  enabled: true
  root_config: ../../config.yaml

input:
  steps_path: auto
  trajectories_path: auto
  history_index_path: auto

output:
  pairs_path: auto
  summary_path: auto

encoder:
  dim: 256
  backend: hashing

pair_builder:
  history_limit: 5
  continuation_limit: 4
  max_candidates: 8
  gamma: 0.75
  lambda_u: 0.35
  tau_omega: 0.25
  min_null_margin: 0.01
  allowed_history_splits:
    - train
    - history
  fallback_current_future: true
