main_project:
  enabled: true
  root_config: ../../config.yaml

seed: 7

data:
  pairs_path: auto
  splits:
    - train

encoder:
  dim: 256
  backend: hashing

model:
  hidden_dim: 128
  dropout: 0.1

training:
  epochs: 5
  batch_size: 8
  lr: 0.001
  beta: 1.0
  base_model_path: ""

output:
  dir: auto
