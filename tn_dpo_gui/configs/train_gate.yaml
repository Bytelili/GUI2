main_project:
  enabled: true
  root_config: ../config.yaml

seed: 7

data:
  pairs_path: auto
  splits:
    - train

encoder:
  dim: 256
  backend: hashing

model:
  hidden_dim: 64
  dropout: 0.1

training:
  epochs: 5
  batch_size: 8
  lr: 0.001
  gate_cost: 0.10
  tau_g: 0.50
  target_mode: net_capacity
  max_candidates: 8

output:
  dir: auto
